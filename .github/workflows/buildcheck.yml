name: Build Check

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend
        run: |
          cd backend
          npm install

      - name: Install frontend
        run: |
          cd frontend
          echo "Frontend ready"